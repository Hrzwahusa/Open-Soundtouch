# Preset-Konfiguration für die physischen/App-Preset-Tasten
# Wird von der App (device_ssh.set_preset) gepflegt – normalerweise nicht von Hand editieren.
#
# Format: N|URL|NAME
#   N    = Preset-Nummer (1..6)
#   URL  = direkte Stream-URL (http; wird per DLNA an die Box gespielt)
#   NAME = Anzeigename
#
# Beispiel (auskommentiert):
# 1|http://stream.rockantenne.de/heavy-metal/stream/mp3|ROCK ANTENNE Heavy Metal
